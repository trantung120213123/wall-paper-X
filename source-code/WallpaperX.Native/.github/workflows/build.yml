name: Build (Windows)

on:
  push:
    branches: [ "main", "source-package" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Configure CMake
        shell: pwsh
        run: cmake -S . -B build-msvc -G "NMake Makefiles"

      - name: Build
        shell: pwsh
        run: cmake --build build-msvc
